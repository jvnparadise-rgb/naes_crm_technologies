<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NAES CRM Opportunity Preview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #f3f6f1;
        --surface: #ffffff;
        --border: #d5ded3;
        --text: #142018;
        --muted: #5f6f63;
        --accent: #2f6b4f;
        --danger-bg: #fff3f1;
        --danger-border: #e7b6ae;
        --danger-text: #8b2f23;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #app {
        min-height: 100vh;
      }

      .boot {
        max-width: 980px;
        margin: 48px auto;
        padding: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
      }

      .boot h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
      }

      .boot p {
        margin: 0;
        color: var(--muted);
      }

      .error {
        max-width: 1100px;
        margin: 32px auto;
        padding: 24px;
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        border-radius: 20px;
        color: var(--danger-text);
      }

      .error h1 {
        margin: 0 0 12px 0;
        font-size: 24px;
      }

      .error pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(255,255,255,0.65);
        padding: 16px;
        border-radius: 14px;
        overflow: auto;
        font-size: 13px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot">
        <h1>Loading NAES CRM Opportunity Preview</h1>
        <p>If this fails, the exact browser error will be shown here instead of a blank page.</p>
      </div>
    </div>

    <script type="module">
      const app = document.getElementById('app');

      function showError(error) {
        const message =
          error && error.stack
            ? error.stack
            : error && error.message
              ? error.message
              : String(error);

        app.innerHTML = `
          <div class="error">
            <h1>Preview failed to load</h1>
            <pre>${message.replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')}</pre>
          </div>
        `;
      }

      window.addEventListener('error', (event) => {
        showError(event.error || event.message || 'Unknown window error');
      });

      window.addEventListener('unhandledrejection', (event) => {
        showError(event.reason || 'Unhandled promise rejection');
      });

      import('./src/preview/opportunityPreview.js').catch(showError);
    </script>
  </body>
</html>
