<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAES CRM, Opportunity Contract Preview</title>
    <style>
      :root {
        --bg: #f4f7f4;
        --surface: #ffffff;
        --surface-2: #f8fbf8;
        --border: #d7e2d8;
        --text: #173024;
        --muted: #587062;
        --accent: #2f6b4f;
        --accent-soft: #e7f2eb;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .page {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }

      .topbar-segment {
        background: linear-gradient(180deg, #ffffff 0%, #f3f8f4 100%);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        text-align: center;
        font-weight: 700;
        color: var(--accent);
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .hero h1 {
        margin: 0 0 6px 0;
        font-size: 28px;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
      }

      .badge {
        background: var(--accent-soft);
        color: var(--accent);
        border: 1px solid #cfe0d2;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.15fr 1fr;
        gap: 20px;
      }

      .stack {
        display: grid;
        gap: 20px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
      }

      .card h2 {
        margin: 0 0 14px 0;
        font-size: 18px;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .meta-item, .list-item {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }

      .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .value {
        font-size: 14px;
        font-weight: 700;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .json {
        margin-top: 20px;
        background: #102019;
        color: #d7efe0;
        border-radius: 18px;
        padding: 18px;
        overflow: auto;
        font-size: 12px;
        line-height: 1.45;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          grid-template-columns: 1fr;
        }

        .meta {
          grid-template-columns: 1fr;
        }

        .hero {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/preview/opportunityPreview.js"></script>
  </body>
</html>
